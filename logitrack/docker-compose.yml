services:
  postgres:
    image: postgres:16-alpine
    container_name: logitrack-postgres
    environment:
      POSTGRES_DB: logitrack
      POSTGRES_USER: logitrack
      POSTGRES_PASSWORD: logitrack
    ports:
      - "55432:5432"
    volumes:
      - logitrack_postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
      - ./database/seed/001_seed_demo_data.sql:/docker-entrypoint-initdb.d/002_seed_demo_data.sql:ro
      - ./database/seed/import_kaggle_seed.sql:/docker-entrypoint-initdb.d/003_import_kaggle_seed.sql:ro
      - ./database/seed:/docker-entrypoint-initdb.d/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logitrack -d logitrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: ./services/backend-api
    container_name: logitrack-backend-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logitrack
      SPRING_DATASOURCE_USERNAME: logitrack
      SPRING_DATASOURCE_PASSWORD: logitrack
      LOGITRACK_CORS_ALLOWED_ORIGIN: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176,http://localhost:5177,http://127.0.0.1:5177
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    container_name: logitrack-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda-topics:
    build:
      context: ./services/redpanda-topics
    container_name: logitrack-redpanda-topics
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  data-simulator:
    build:
      context: ./services/data-simulator
    container_name: logitrack-data-simulator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SIMULATOR_CSV_PATH: /data/processed/kaggle/deliveries.csv
      SIMULATION_INTERVAL_SECONDS: 5
      SIMULATION_MAX_EVENTS: 100
      SIMULATION_LOOP: "false"
      SIMULATION_RESET_ON_START: "true"
      SIMULATOR_ROUTE_SEED: 42
    volumes:
      - ./data:/data:ro
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-topics:
        condition: service_completed_successfully

  stream-consumer:
    build:
      context: ./services/stream-consumer
    container_name: logitrack-stream-consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_CONSUMER_GROUP_ID: logitrack-csv-replay-consumer
      KAFKA_AUTO_OFFSET_RESET: latest
      DATABASE_URL: postgresql://logitrack:logitrack@postgres:5432/logitrack
      BACKEND_API_BASE_URL: http://backend-api:8080
      SIMULATION_RESET_ON_START: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-topics:
        condition: service_completed_successfully
      backend-api:
        condition: service_started

  analytics-service:
    build:
      context: ./services/analytics-service
    container_name: logitrack-analytics-service
    environment:
      DATABASE_URL: postgresql://logitrack:logitrack@postgres:5432/logitrack
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  logitrack_postgres_data:
