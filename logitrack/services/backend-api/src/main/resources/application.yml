server:
  port: 8080

spring:
  application:
    name: backend-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logitrack}
    username: ${SPRING_DATASOURCE_USERNAME:logitrack}
    password: ${SPRING_DATASOURCE_PASSWORD:logitrack}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

logitrack:
  cors:
    allowed-origin: ${LOGITRACK_CORS_ALLOWED_ORIGIN:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176,http://localhost:5177,http://127.0.0.1:5177}
